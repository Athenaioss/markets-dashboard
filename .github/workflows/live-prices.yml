name: Live Prices

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live prices
        run: python live_streamer.py
        timeout-minutes: 3

      - name: Deploy live_prices.json to gh-pages
        env:
          REPO_URL: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        run: |
          set -e
          DEPLOY_DIR=$(mktemp -d)

          if git clone --branch gh-pages --depth 1 "$REPO_URL" "$DEPLOY_DIR" 2>/dev/null; then
            echo "Cloned existing gh-pages"
          else
            echo "Creating new orphan gh-pages"
            cd "$DEPLOY_DIR"
            git init
            git checkout --orphan gh-pages
            git remote add origin "$REPO_URL"
            cd - > /dev/null
          fi

          cd "$DEPLOY_DIR"
          git remote set-url origin "$REPO_URL" 2>/dev/null || git remote add origin "$REPO_URL"
          cp "$GITHUB_WORKSPACE/live_prices.json" . && echo "  ✅ live_prices.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_prices.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          TS=$(date -u +%Y%m%d-%H%M%S)
          git commit -m "prices: ${TS}"
          git push --force origin gh-pages
          echo "✅ Pushed live_prices.json"
