name: Live Prices

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live prices
        run: python live_streamer.py
        timeout-minutes: 3

      - name: Deploy live_prices.json to gh-pages
        run: |
          # Clone existing gh-pages branch or create new
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
            git reset --hard origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Copy updated live_prices.json
          cp live_prices.json .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_prices.json
          TS=$(date -u +%Y%m%d-%H%M%S)
          git commit -m "prices: ${TS}" || { echo "No changes"; exit 0; }
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          echo "✅ Pushed live_prices.json to gh-pages"
