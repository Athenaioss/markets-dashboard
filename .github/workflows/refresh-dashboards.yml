name: Refresh Dashboards

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run master pipeline
        run: python master_pipeline.py
        timeout-minutes: 10

      - name: Deploy to gh-pages
        run: |
          set -e
          DEPLOY_DIR=$(mktemp -d)
          echo "Deploy dir: $DEPLOY_DIR"

          # Try to clone existing gh-pages to preserve live_prices.json
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            "$DEPLOY_DIR" 2>/dev/null || {
            echo "No existing gh-pages branch — creating orphan"
            cd "$DEPLOY_DIR"
            git init
            git checkout --orphan gh-pages
          }

          cd "$DEPLOY_DIR"

          # Copy all generated dashboard files from workspace
          for f in crypto commodities indices forex actions etf; do
            src="$GITHUB_WORKSPACE/${f}_dashboard.html"
            if [ -f "$src" ]; then
              cp "$src" .
              echo "  ✅ ${f}_dashboard.html"
            fi
          done
          cp "$GITHUB_WORKSPACE/index.html" . && echo "  ✅ index.html"
          cp "$GITHUB_WORKSPACE/CNAME" . 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes — skipping push"
            exit 0
          fi
          TS=$(date -u +%Y%m%d-%H%M%S)
          git commit -m "dashboards: ${TS}"
          git push --force origin gh-pages
          echo "✅ Deployed to gh-pages"
