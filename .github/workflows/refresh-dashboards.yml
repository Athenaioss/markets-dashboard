name: Refresh Dashboards

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || true

      - name: Run master pipeline (all 6 dashboards + scanner)
        run: python master_pipeline.py
        timeout-minutes: 10

      - name: Deploy to gh-pages (merge with existing)
        run: |
          # Fetch existing gh-pages or create clean orphan
          git fetch origin gh-pages 2>/dev/null || true
          DEPLOY_DIR=/tmp/gh-deploy
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          if git show-ref --verify refs/remotes/origin/gh-pages >/dev/null 2>&1; then
            # Clone existing gh-pages to preserve live_prices.json etc
            git clone --branch gh-pages --depth 1 \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
              "$DEPLOY_DIR" 2>&1 || true
          fi

          cd "$DEPLOY_DIR" 2>/dev/null || { mkdir -p "$DEPLOY_DIR" && cd "$DEPLOY_DIR" && git init && git checkout --orphan gh-pages; }

          # Copy all generated dashboard files
          for f in crypto commodities indices forex actions etf; do
            if [ -f "$GITHUB_WORKSPACE/${f}_dashboard.html" ]; then
              cp "$GITHUB_WORKSPACE/${f}_dashboard.html" .
              echo "  ✅ ${f}_dashboard.html"
            fi
          done
          cp "$GITHUB_WORKSPACE/index.html" . && echo "  ✅ index.html"
          cp "$GITHUB_WORKSPACE/CNAME" . 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          TS=$(date -u +%Y%m%d-%H%M%S)
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "dashboards: ${TS}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          echo "✅ Deployed to gh-pages"
