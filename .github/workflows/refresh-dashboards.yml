name: Refresh Dashboards

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run master pipeline
        run: python master_pipeline.py
        timeout-minutes: 10

      - name: Deploy to gh-pages
        env:
          REPO_URL: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        run: |
          set -e
          DEPLOY_DIR=$(mktemp -d)

          # Try to clone existing gh-pages, or create orphan
          if git clone --branch gh-pages --depth 1 "$REPO_URL" "$DEPLOY_DIR" 2>/dev/null; then
            echo "Cloned existing gh-pages branch"
          else
            echo "Creating new orphan gh-pages branch"
            cd "$DEPLOY_DIR"
            git init
            git checkout --orphan gh-pages
            git remote add origin "$REPO_URL"
            cd - > /dev/null
          fi

          cd "$DEPLOY_DIR"
          # Ensure remote is set (clone already has it, init just added it)
          git remote set-url origin "$REPO_URL" 2>/dev/null || git remote add origin "$REPO_URL"

          # Copy all generated dashboard files
          for f in crypto commodities indices forex actions etf; do
            src="$GITHUB_WORKSPACE/${f}_dashboard.html"
            [ -f "$src" ] && cp "$src" . && echo "  ✅ ${f}_dashboard.html"
          done
          cp "$GITHUB_WORKSPACE/index.html" . && echo "  ✅ index.html"
          cp "$GITHUB_WORKSPACE/CNAME" . 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes — skipping push"
            exit 0
          fi
          TS=$(date -u +%Y%m%d-%H%M%S)
          git commit -m "dashboards: ${TS}"
          git push --force origin gh-pages
          echo "✅ Deployed to gh-pages"
